<!DOCTYPE html>
<html>
<head>
    <title>Tic Tac Toe</title>
<style>
    .board{
        display: grid;
        grid-template-columns: repeat(3,100px);
        gap:5px;
    }
    button{
        width:100px;
        height: 100px;
        font-size: 30px;
    }
</style>
</head>

<body>
    <h1>Tic Toa Toe</h1>

    <div class="board">
    {% for i in range(9)%}
    <form method="POST">
       <input type="hidden" name="cell" value="{{i}}">
       <button type="submit">{{board[i]}}</button>
    </form> 
    {%endfor%}
    </div>

<form action="/restart" method="POST">
    <button type="submit">
        Restart Game
    </button>
</form>
    <h2>Result :{{message}}</h2>
</body>
</html>
